name: Laravel Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Deploy to Server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |

          set -e

          BASE=/var/www
          RELEASE=$BASE/renew-releases/release_$(date +%s)

          echo "Creating release folder"
          mkdir -p $RELEASE

          cd $RELEASE

          echo "Cloning repo"
          git clone https://github.com/AmanRawat2001/renew_backend.git .

          echo "Link env"
          ln -s $BASE/renew-shared/.env .env

          echo "Link storage"
          rm -rf storage
          ln -s $BASE/renew-shared/storage storage

          echo "Install dependencies"
          composer install --no-dev --optimize-autoloader

          echo "Laravel optimize"
          php artisan config:clear
          php artisan cache:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

          echo "Run migrations"
          php artisan migrate --force

          echo "Fix permissions"
          chown -R deploy:www-data $RELEASE
          chmod -R 775 $RELEASE/storage
          chmod -R 775 $RELEASE/bootstrap/cache

          echo "Switch release"
          ln -sfn $RELEASE $BASE/renew
          echo "Deployment successful"